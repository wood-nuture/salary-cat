<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 招财工资表</title>
<style>
:root {
  --gold-1: #f9d976;
  --gold-2: #f39c12;
  --gold-3: #e67e22;
  --bg: linear-gradient(135deg, #0d0705 0%, #1f1008 25%, #2d1810 50%, #1f1008 75%, #0d0705 100%);
  --text: #fceabb;
  --text2: #c9a96e;
  --text3: rgba(201,169,110,0.4);
  --card: rgba(255,215,150,0.06);
  --border: rgba(255,215,150,0.15);
  --hover: rgba(255,215,150,0.12);
  --shadow: rgba(0,0,0,0.4);
  --green: #81c784;
  --orange: #ffb74d;
  --blue: #5a9fcf;
  --radius: 20px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
body.dark {
  --bg: linear-gradient(135deg, #050508 0%, #0d0d1a 50%, #050510 100%);
  --text: #c8c8d4;
  --text2: #7a7a8a;
  --text3: rgba(120,120,140,0.35);
  --card: rgba(255,255,255,0.02);
  --border: rgba(255,255,255,0.06);
  --hover: rgba(255,255,255,0.04);
  --shadow: rgba(0,0,0,0.6);
  --gold-1: #b8974a;
  --gold-2: #a07830;
  --gold-3: #8a6420;
  --green: #5a8a5c;
  --orange: #b89440;
}
body.dark .amount-num,body.dark .amount-dec{
  background:linear-gradient(180deg,#d4d4e0 0%,#b8974a 45%,#8a6420 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;background:var(--bg);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;user-select:none;
  transition:background 0.6s;
}

/* ===== 金元宝雨 ===== */
.ingot-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.ingot{position:absolute;font-size:26px;opacity:0;animation:ingotFloat linear infinite;filter:drop-shadow(0 0 10px rgba(249,217,118,0.18))}
@keyframes ingotFloat{
  0%{transform:translateY(105vh)rotate(0deg)scale(0.3);opacity:0}
  10%{opacity:0.45;transform:translateY(85vh)rotate(12deg)scale(0.65)}
  35%{opacity:0.55;transform:translateY(55vh)rotate(-8deg)scale(0.85)}
  65%{opacity:0.35;transform:translateY(25vh)rotate(18deg)scale(0.6)}
  90%{opacity:0.15;transform:translateY(5vh)rotate(-3deg)scale(0.35)}
  100%{transform:translateY(-5vh)rotate(8deg)scale(0.1);opacity:0}
}

/* ===== 星星 ===== */
.sparkle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:sparkleFloat linear infinite;opacity:0}
@keyframes sparkleFloat{
  0%{transform:translateY(0)scale(0.2);opacity:0}
  20%{opacity:0.5;transform:translateY(-25px)scale(1)}
  70%{opacity:0.2;transform:translateY(-100px)scale(0.5)}
  100%{transform:translateY(-160px)scale(0.05);opacity:0}
}

/* ===== 主容器 ===== */
.container{position:relative;z-index:1;text-align:center;width:520px;max-width:92vw}

/* ===== 招财猫 ===== */
.cat{
  font-size:74px;margin-bottom:0;animation:catWave 2.6s ease-in-out infinite;
  filter:drop-shadow(0 0 30px rgba(249,217,118,0.2));cursor:pointer;
  transition:transform 0.18s;display:inline-block;position:relative;
}
.cat:hover{transform:scale(1.1)}
.cat::after{content:'💰';position:absolute;top:-6px;right:-14px;font-size:16px;animation:catCoin 2.2s ease-in-out infinite}
@keyframes catCoin{0%,100%{transform:translateY(0)rotate(0deg);opacity:0.6}50%{transform:translateY(-12px)rotate(18deg);opacity:1}}
@keyframes catWave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.cat.tap{animation:catTap 0.35s ease}
@keyframes catTap{
  0%{transform:scale(1)rotate(0deg)}
  25%{transform:scale(1.28)rotate(-12deg)}
  55%{transform:scale(0.92)rotate(6deg)}
  100%{transform:scale(1)rotate(0deg)}
}

/* ===== 标题行 ===== */
.title-row{
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
  margin-bottom:12px;color:var(--text2);font-size:14px;letter-spacing:2px;
}
.status-badge{
  display:inline-block;padding:2px 14px;border-radius:20px;font-size:12px;
}
.status-badge.wk{background:rgba(76,175,80,0.12);color:var(--green);box-shadow:0 0 12px rgba(76,175,80,0.06)}
.status-badge.rs{background:rgba(255,152,0,0.1);color:var(--orange);box-shadow:0 0 12px rgba(255,152,0,0.04)}
.status-badge.sl{background:rgba(100,150,255,0.12);color:#7c9cf0;box-shadow:0 0 12px rgba(100,150,255,0.06)}

/* ===== 倒计时 ===== */
.cd-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;cursor:pointer;position:relative}
.cd-wrap:hover .cd-lbl{color:var(--gold-2)}
.cd-lbl{color:var(--text2);font-size:13px;transition:color 0.2s}
.cd{font-size:30px;font-weight:700;color:var(--gold-1);text-shadow:0 0 24px rgba(249,217,118,0.2);font-variant-numeric:tabular-nums;letter-spacing:3px;min-width:148px;transition:color 0.3s}
.cd.pause{color:var(--orange);text-shadow:0 0 20px rgba(255,152,0,0.12)}
.cd.done{color:var(--green);text-shadow:0 0 30px rgba(105,240,174,0.25)}

/* ===== 摸鱼按钮 ===== */
.slack-btn{
  display:inline-flex;align-items:center;gap:5px;margin:0 0 2px 6px;
  padding:3px 12px 3px 8px;border:1px solid var(--border);border-radius:30px;
  background:var(--card);color:var(--text2);font-size:11px;cursor:pointer;
  transition:all 0.25s;font-family:inherit;vertical-align:middle;
}
.slack-btn:hover{background:var(--hover);border-color:var(--gold-2);color:var(--gold-1)}
.slack-btn.active{background:rgba(100,150,255,0.1);border-color:#7c9cf0;color:#7c9cf0;animation:slackPulse 2s ease-in-out infinite}
@keyframes slackPulse{0%,100%{box-shadow:0 0 0 rgba(100,150,255,0)}50%{box-shadow:0 0 12px rgba(100,150,255,0.15)}}

/* ===== 金额 ===== */
.amount-wp{
  position:relative;margin:4px 0;padding:26px 20px 20px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  backdrop-filter:blur(14px);box-shadow:inset 0 0 80px rgba(249,217,118,0.015),0 8px 40px var(--shadow);
  overflow:hidden;transition:all 0.4s;
}
.amount-wp.paused{box-shadow:inset 0 0 60px rgba(100,150,255,0.03),0 8px 40px var(--shadow)}
.amount-wp::before{content:'';position:absolute;top:-60%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 0%,var(--gold-soft,transparent)0%,transparent 50%);pointer-events:none}
.money-s{font-size:28px;color:var(--gold-1);vertical-align:top;line-height:1;opacity:0.55;margin-right:2px;transition:color 0.4s}
.amount-num{
  font-size:70px;font-weight:800;
  background:linear-gradient(180deg,#fff3d6 0%,#f8b500 45%,#e67e22 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-1px;transition:all 0.4s;
}
.amount-dec{
  font-size:26px;font-weight:600;
  background:linear-gradient(180deg,#fff3d6 0%,#f8b500 45%,#e67e22 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  vertical-align:baseline;letter-spacing:1px;transition:all 0.4s;
}
.amount-ft{
  font-size:14px;color:var(--text2);margin-top:5px;letter-spacing:0.5px;min-height:22px;
  opacity:0.85;transition:all 0.3s;line-height:1.5;
}

/* ===== 数据条 ===== */
.stat-row{
  display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap;
}
.stat-chip{
  display:flex;align-items:center;gap:4px;
  background:var(--card);padding:4px 10px;border-radius:16px;border:1px solid var(--border);
  font-size:12px;color:var(--text2);transition:all 0.3s;
}
.stat-val{color:var(--gold-1);font-weight:600}
.stat-bg{padding:1px 5px;border-radius:8px;font-size:10px}
.stat-bg.ok{background:rgba(76,175,80,0.12);color:var(--green)}

/* ===== 满勤条 ===== */
.att-bar{display:flex;align-items:center;gap:7px;margin-top:8px;justify-content:center}
.att-lb{font-size:10px;color:var(--text3);letter-spacing:0.3px}
.att-tr{width:100px;height:3px;background:var(--border);border-radius:4px;overflow:hidden}
.att-fl{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold-2),var(--gold-1));transition:width 0.6s ease}
.att-nm{font-size:10px;color:var(--text2)}

/* ===== 金币爆发 ===== */
.burst-box{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.burst-p{position:absolute;pointer-events:none;animation:burstFly 1.2s ease-out forwards;filter:drop-shadow(0 0 6px rgba(249,217,118,0.3))}
@keyframes burstFly{
  0%{transform:translate(0,0)scale(0.3)rotate(0deg);opacity:1}
  22%{opacity:1;transform:translate(var(--tx),var(--ty))scale(1.35)rotate(160deg)}
  50%{opacity:0.75;transform:translate(calc(var(--tx)*1.5),calc(var(--ty)*1.2))scale(0.85)rotate(340deg)}
  100%{opacity:0;transform:translate(calc(var(--tx)*2.6),calc(var(--ty)*1.8))scale(0.1)rotate(720deg)}
}
.burst-p.big{font-size:32px!important}
@keyframes burstFlyBig{
  0%{transform:translate(0,0)scale(0.2)rotate(0deg);opacity:1}
  20%{opacity:1;transform:translate(var(--tx),var(--ty))scale(1.6)rotate(180deg)}
  45%{opacity:0.85;transform:translate(calc(var(--tx)*1.3),calc(var(--ty)*1.1))scale(1)rotate(360deg)}
  100%{opacity:0;transform:translate(calc(var(--tx)*2.2),calc(var(--ty)*1.6))scale(0.05)rotate(900deg)}
}

/* ===== 庆祝 ===== */
.celeb{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;display:none}
.celeb.show{display:block}
.celeb-t{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-size:52px;font-weight:800;color:var(--gold-1);text-shadow:0 0 40px rgba(249,217,118,0.35),0 0 80px rgba(249,217,118,0.12);animation:celebPulse 0.6s ease-out forwards;white-space:nowrap}
@keyframes celebPulse{0%{transform:translate(-50%,-50%)scale(0);opacity:0}40%{transform:translate(-50%,-50%)scale(1.4);opacity:1}100%{transform:translate(-50%,-50%)scale(1);opacity:1}}
.celeb-s{position:absolute;top:54%;left:50%;transform:translate(-50%,0);font-size:17px;color:var(--text2);animation:celebFade 2.2s ease-out forwards;opacity:0}
@keyframes celebFade{0%{opacity:0;transform:translate(-50%,12px)}25%{opacity:1;transform:translate(-50%,0)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-8px)}}
.celeb-c{position:absolute;border-radius:2px;animation:celebFall var(--dur) ease-out forwards}
@keyframes celebFall{0%{transform:translateY(-5vh)rotate(0deg);opacity:1}100%{transform:translateY(105vh)rotate(720deg);opacity:0}}

/* ===== 财神 ===== */
.caishen{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:30;display:none}
.caishen.show{display:block}
.caishen-e{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:100px;animation:caishenEnter 1.8s ease-out forwards;filter:drop-shadow(0 0 50px rgba(249,217,118,0.35))}
@keyframes caishenEnter{
  0%{transform:translate(-50%,-90%)scale(0);opacity:0}
  35%{transform:translate(-50%,-45%)scale(1.25);opacity:1}
  55%{transform:translate(-50%,-52%)scale(0.92)}
  75%{transform:translate(-50%,-47%)scale(1.06)}
  100%{transform:translate(-50%,-50%)scale(1);opacity:1}
}
.caishen-t{position:absolute;top:60%;left:50%;transform:translate(-50%,0);font-size:26px;font-weight:800;color:#ff4444;text-shadow:0 0 30px rgba(255,68,68,0.2);animation:caishenText 0.8s 0.6s ease-out forwards;opacity:0;white-space:nowrap}
@keyframes caishenText{0%{opacity:0;transform:translate(-50%,20px)}100%{opacity:1;transform:translate(-50%,0)}}
.caishen-g{position:absolute;font-size:16px;animation:caishenGold linear forwards;opacity:0}
@keyframes caishenGold{0%{transform:translateY(-10vh)rotate(0deg);opacity:0.7}100%{transform:translateY(105vh)rotate(360deg);opacity:0}}

/* ===== 数据面板 ===== */
.stats-panel{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:360px;max-width:88vw;padding:28px 24px;
  background:var(--modal-bg,linear-gradient(160deg,#2d1810 0%,#1a0e0a 100%));
  border:1px solid var(--border);border-radius:var(--radius);
  z-index:40;display:none;box-shadow:0 20px 60px var(--shadow);
}
.stats-panel.show{display:block}
.stats-panel h3{color:var(--gold-1);font-size:17px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stats-item{padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;text-align:left}
.stats-item .lbl{font-size:11px;color:var(--text3);margin-bottom:3px}
.stats-item .val{font-size:16px;font-weight:700;color:var(--gold-1)}
.stats-item .sub{font-size:10px;color:var(--text2);margin-top:2px}
.stats-full{grid-column:1/-1;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:12px;text-align:left;margin-top:4px}
.stats-full .lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.stats-full .bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:4px}
.stats-full .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold-2),var(--gold-1));transition:width 0.5s}
.stats-close{
  margin-top:14px;width:100%;padding:8px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;transition:0.2s;
}
.stats-close:hover{background:var(--hover);color:var(--gold-1)}

/* ===== 顶部按钮 ===== */
.top-bar{position:fixed;top:16px;right:16px;display:flex;gap:5px;z-index:5}
.top-btn{
  width:36px;height:36px;border:1px solid var(--border);border-radius:50%;
  background:var(--card);color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s;backdrop-filter:blur(8px);
}
.top-btn:hover{background:var(--hover);color:var(--gold-1);box-shadow:0 0 16px rgba(249,217,118,0.06)}
.top-btn.snd-off{opacity:0.4}
.top-btn.drk-on{color:#7c7cf0;box-shadow:0 0 12px rgba(124,124,240,0.1)}

/* ===== 弹窗 ===== */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:50;animation:overFade 0.25s ease;
}
.overlay.show{display:flex}
@keyframes overFade{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--modal-bg,linear-gradient(160deg,#2d1810 0%,#1a0e0a 100%));
  border:1px solid var(--border);border-radius:var(--radius);padding:28px;
  width:440px;max-width:92vw;max-height:85vh;overflow-y:auto;
  animation:modalUp 0.3s ease;box-shadow:0 20px 60px var(--shadow);transition:background 0.4s;
}
@keyframes modalUp{from{transform:translateY(25px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-h h2{font-size:19px;color:var(--gold-1);display:flex;align-items:center;gap:7px;transition:color 0.3s}
.modal-x{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:transparent;color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:0.2s}
.modal-x:hover{background:var(--hover);color:var(--gold-1)}
.fg{margin-bottom:16px}
.fg label{display:block;color:var(--text2);font-size:13px;margin-bottom:4px;letter-spacing:0.2px}
.fg .hint{font-size:11px;color:var(--text3);margin-top:2px}
.fr{display:flex;gap:10px}
.fr .fg{flex:1}
input,select{
  width:100%;padding:9px 13px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:0.2s;font-family:inherit;
}
input:focus,select:focus{border-color:var(--gold-2);box-shadow:0 0 16px rgba(249,217,118,0.06)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
select option{background:#2d1810;color:#fceabb}
.ti{display:flex;align-items:center;gap:6px}
.ti input{width:76px;text-align:center}
.ti .co{color:var(--text2);font-size:15px;font-weight:600}
.dc{display:flex;gap:5px;flex-wrap:wrap}
.dc-lb{
  display:flex;align-items:center;gap:2px;padding:5px 10px;border:1px solid var(--border);
  border-radius:8px;cursor:pointer;transition:0.2s;color:var(--text2);font-size:12px;background:transparent;user-select:none;
}
.dc-lb:hover{border-color:var(--gold-2)}
.dc-lb.on{background:rgba(249,217,118,0.08);border-color:var(--gold-2);color:var(--gold-1)}
.dc-lb input{display:none}
.mf{margin-top:20px;display:flex;gap:10px;justify-content:flex-end}
.btn{padding:9px 22px;border:none;border-radius:10px;font-size:13px;cursor:pointer;transition:0.2s;font-family:inherit;font-weight:600}
.btn-pri{background:linear-gradient(135deg,var(--gold-2),var(--gold-3));color:#fff}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(243,156,18,0.18)}
.btn-sec{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-sec:hover{background:var(--hover)}

/* ===== 语音包选择 ===== */
.spk-opt{
  display:flex;gap:6px;flex-wrap:wrap;
}
.spk-lb{
  padding:7px 14px;border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:0.2s;color:var(--text2);font-size:12px;background:transparent;user-select:none;
  display:flex;align-items:center;gap:4px;
}
.spk-lb:hover{border-color:var(--gold-2)}
.spk-lb.on{background:rgba(249,217,118,0.08);border-color:var(--gold-2);color:var(--gold-1)}
.spk-lb input{display:none}
.spk-preview{font-size:10px;color:var(--text3);margin-top:4px;font-style:italic}

@media(max-width:530px){
  .cat{font-size:50px}.amount-num{font-size:44px}.amount-dec{font-size:18px}.money-s{font-size:22px}
  .cd{font-size:22px;min-width:110px}.fr{flex-direction:column;gap:0}.modal{padding:18px}
  .stat-row{gap:6px;font-size:11px}.dc-lb{padding:4px 7px;font-size:11px}
  .top-bar{top:10px;right:10px}.top-btn{width:32px;height:32px;font-size:13px}
  .celeb-t{font-size:36px}.caishen-e{font-size:72px}.stats-panel{width:92vw;padding:20px}
}
</style>
</head>
<body>

<div class="ingot-rain" id="ingotRain"></div>
<div id="sparkles"></div>
<div class="burst-box" id="burstBox"></div>
<div class="celeb" id="celeb"></div>
<div class="caishen" id="caishen"></div>

<div class="top-bar">
  <button class="top-btn" id="statsBtn" onclick="openStats()" title="数据统计">📊</button>
  <button class="top-btn" id="darkBtn" onclick="toggleDark()" title="深色模式">🌙</button>
  <button class="top-btn" id="soundBtn" onclick="toggleSound()" title="音效开关">🔊</button>
  <button class="top-btn" onclick="openSettings()">⚙️</button>
</div>

<div class="container">
  <div class="cat" id="cat" onclick="tapCat()">🐱</div>

  <div class="title-row">
    今日搬砖收益
    <span class="status-badge" id="statusBadge">● 搬砖中</span>
  </div>

  <div class="cd-wrap" onclick="toggleCD()">
    <span class="cd-lbl" id="cdLbl">⏳ 距离下班</span>
    <span class="cd" id="cd">00:00:00</span>
    <button class="slack-btn" id="slackBtn" onclick="event.stopPropagation();toggleSlack()">😴 摸鱼</button>
  </div>

  <div class="amount-wp" id="amountWp">
    <div>
      <span class="money-s">¥</span>
      <span class="amount-num" id="amountInt">0</span>
      <span class="amount-dec" id="amountDec">.00000000</span>
    </div>
    <div class="amount-ft" id="amountFt">开始搬砖赚小钱钱~</div>
  </div>

  <div class="stat-row">

function fireSnd(ctx){

// ============================================================
//  计算引擎
// ============================================================
function calc(){
  const n=new Date(),d=n.getDay(),w=settings.wd.includes(d);
  const ms=n.getHours()*60+n.getMinutes(),sm=settings.sH*60+settings.sM,em=settings.eH*60+settings.eM;
  const lm=settings.lH*60,eff=em-sm-lm;
  const daily=eff>0?settings.salary/settings.mwd:0,pms=eff>0?daily/eff/60/1000:0;
  const ds=new Date(n.getFullYear(),n.getMonth(),n.getDate(),settings.sH,settings.sM,0,0);
  const de=new Date(n.getFullYear(),n.getMonth(),n.getDate(),settings.eH,settings.eM,0,0);
  let st='before',earn=0,rem=0,wrk=0;
  if(!w) st='rest';
  else{
    const ls=sm+eff/2,le=ls+lm;
    if(ms<sm) st='before';
    else if(ms<ls){st='working';wrk=n-ds;earn=wrk*pms;rem=de-n;}
    else if(ms<le){st='lunch';const mrn=(ls-sm)*60*1000;earn=mrn*pms;rem=de-n;wrk=mrn;}
    else if(ms<em){st='working';const mrn=(ls-sm)*60*1000;const ae=n-new Date(n.getFullYear(),n.getMonth(),n.getDate(),Math.floor(le/60),le%60,0,0);earn=(mrn+Math.max(0,ae))*pms;rem=de-n;wrk=mrn+Math.max(0,ae);}
    else{st='after';earn=daily;rem=0;wrk=(em-sm-lm)*60*1000;}
  }
  if(earn>daily) earn=daily;if(rem<0) rem=0;if(earn<0) earn=0;
  const ws=new Date(n);ws.setDate(n.getDate()-n.getDay());let wkE=0;
  for(let d2=new Date(ws);d2<=n;d2.setDate(d2.getDate()+1)) if(settings.wd.includes(d2.getDay())) wkE+=daily;
  const ms2=new Date(n.getFullYear(),n.getMonth(),1);let att=0;
  for(let d2=new Date(ms2);d2<n;d2.setDate(d2.getDate()+1)) if(settings.wd.includes(d2.getDay())) att++;
  return {earn,daily,pms,rem,st,w,wrk,wkE,att};
}

function fmt(m){if(m<=0)return'00:00:00';const ts=Math.floor(m/1000);return`${String(Math.floor(ts/3600)).padStart(2,'0')}:${String(Math.floor((ts%3600)/60)).padStart(2,'0')}:${String(ts%60).padStart(2,'0')}`}

//  UI 更新
// ============================================================
let isSlacking=false;

function updUI(){
  const r=calc(),{earn,daily,pms,rem,st,w,wrk,wkE,att}=r;

  // 暂停状态下不更新金额
  if(!slack){
    const ip=Math.floor(earn),dp=(earn-ip).toFixed(8).slice(2);
    document.getElementById('amountInt').textContent=ip.toLocaleString();
    document.getElementById('amountDec').textContent='.'+dp;
  }

  // 语录（稳定版：只随状态切换改变，不闪烁）
  const ft=document.getElementById('amountFt');
  if(typeof updUI._qIdx === 'undefined') updUI._qIdx={};
  const qKey = slack?'slack':(st==='working'?'wk':st);
  if(qKey !== updUI._qKey){
    updUI._qKey = qKey;
    if(!updUI._qIdx[qKey]) updUI._qIdx[qKey]=0;
    updUI._qIdx[qKey] = (updUI._qIdx[qKey]+1) % QT[qKey].length;
    ft.textContent = QT[qKey][updUI._qIdx[qKey]];
  }

  // 倒计时
  const cd=document.getElementById('cd'),cl=document.getElementById('cdLbl');
  if(slack){cd.textContent='⏸️ 摸鱼中';cd.className='cd pause';cl.textContent='😴 暂停计时';}
  else if(st==='rest'){cd.textContent='🎉 休息日';cd.className='cd pause';cl.textContent='⏳ 距离下班';}
  else if(st==='before'){const df=new Date();df.setHours(settings.sH,settings.sM,0,0);const dff=df-Date.now();cd.textContent=dff>0?'距上班 '+fmt(dff):'00:00:00';cd.className='cd pause';cl.textContent='⏳ 距离上班';}
  else if(st==='after'&&rem<=0){cd.textContent='🎉 已下班！';cd.className='cd done';cl.textContent='⏳ 下班啦';}
  else if(cdMode===0){cd.textContent=fmt(rem);cd.className='cd';cl.textContent='⏳ 距离下班';}
  else{cd.textContent=fmt(wrk);cd.className='cd';cl.textContent='🕐 已上班';}

  // 状态标签
  const sb=document.getElementById('statusBadge');
  if(slack){sb.textContent='● 摸鱼中';sb.className='status-badge sl';}
  else if(!w){sb.textContent='● 休息日';sb.className='status-badge rs';}
  else if(st==='lunch'){sb.textContent='● 午休中';sb.className='status-badge rs';}
  else if(st==='before'){sb.textContent='● 未开工';sb.className='status-badge rs';}
  else if(st==='after'){sb.textContent='● 已下班 🎉';sb.className='status-badge rs';}
  else{sb.textContent='● 搬砖中';sb.className='status-badge wk';}

  // 统计
  document.getElementById('statDaily').textContent=daily>0?daily.toFixed(2):'--';
  document.getElementById('statPerSec').textContent=pms>0?(pms*1000).toFixed(4):'--';
  if(daily>0){
    const t=new Date(),ms3=new Date(t.getFullYear(),t.getMonth(),1);let wdp=0;
    for(let d2=new Date(ms3);d2<t;d2.setDate(d2.getDate()+1)) if(settings.wd.includes(d2.getDay())) wdp++;
    document.getElementById('statMonth').textContent=(wdp*daily).toFixed(2);
  }else document.getElementById('statMonth').textContent='--';

  // 满勤
  const pct=Math.min(100,(att/settings.mwd)*100);
  document.getElementById('attFill').style.width=pct+'%';
  document.getElementById('attNum').textContent=att+'/'+settings.mwd;

  // ===== 分层触发 =====
  if(!slack&&st==='working'){
    const ci=Math.floor(earn);
    if(ci>lastInt){const cnt=Math.min(ci-lastInt,8);burst(3+cnt);playCoin();lastInt=ci;}
    if(ci>=Math.floor(daily)&&lastDaily!==Math.floor(daily)){lastDaily=Math.floor(daily);burst(12);playFire();}
  }else if(st==='after'&&lastInt<0) lastInt=Math.floor(earn);
  else if(st==='rest'||st==='before'){lastInt=-1;lastDaily=-1;}

  if(st==='after'&&!celebAct&&lastSt!=='after'){offWork();}
  lastSt=st;

  if(att>=settings.mwd&&!attTrig&&st==='after'){attTrig=true;localStorage.setItem('salaryAttTrig','true');setTimeout(()=>showCai(),1000);}

  // 每日出勤记录
  if(w&&(st==='working'||st==='after')&&att>0){
    const tk=new Date().toDateString(),lk=localStorage.getItem('salaryAttDate');
    if(lk!==tk){localStorage.setItem('salaryAttDate',tk);const cur=parseInt(localStorage.getItem('salaryAtt'))||0;if(cur<settings.mwd)localStorage.setItem('salaryAtt',Math.min(cur+1,settings.mwd));}
  }
}

// ============================================================
//  金币爆发
// ============================================================
function burst(c){
  const box=document.getElementById('burstBox'),em=['🪙','💰','✨','🌟','💫','🤑','💎','👛'];
  for(let i=0;i<c;i++){
    const el=document.createElement('div');el.className='burst-p';
    el.textContent=em[Math.floor(Math.random()*em.length)];
    const cx=window.innerWidth/2,cy=window.innerHeight/2-30;
    el.style.left=(cx+(Math.random()-0.5)*140)+'px';el.style.top=(cy+(Math.random()-0.5)*60)+'px';
    const tx=(Math.random()-0.5)*320,ty=-(Math.random()*220+60);
    el.style.setProperty('--tx',tx+'px');el.style.setProperty('--ty',ty+'px');
    el.style.fontSize=(18+Math.random()*18)+'px';el.style.animationDuration=(0.8+Math.random()*0.5)+'s';
    box.appendChild(el);setTimeout(()=>el.remove(),1500);
  }
}

// ============================================================
//  下班庆祝
// ============================================================
function offWork(){
  celebAct=true;const ov=document.getElementById('celeb');ov.innerHTML='';ov.className='celeb show';
  const t=document.createElement('div');t.className='celeb-t';t.textContent='🎉 下班啦！🎉';ov.appendChild(t);
  const s=document.createElement('div');s.className='celeb-s';s.textContent='今天赚了 ¥'+calc().daily.toFixed(2);ov.appendChild(s);
  const cs=['#f9d976','#ff6b6b','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#f368e0','#ffd1dc','#69f0ae','#ffab40'];
  for(let i=0;i<80;i++){const c=document.createElement('div');c.className='celeb-c';c.style.left=Math.random()*100+'%';c.style.top='-5px';c.style.background=cs[Math.floor(Math.random()*cs.length)];c.style.width=(3+Math.random()*8)+'px';c.style.height=(3+Math.random()*8)+'px';c.style.setProperty('--dur',(2+Math.random()*3)+'s');c.style.animationDelay=(Math.random()*2.5)+'s';c.style.borderRadius=['50%','2px','0'][Math.floor(Math.random()*3)];ov.appendChild(c);setTimeout(()=>c.remove(),6000);}
  playOff();for(let i=0;i<6;i++)setTimeout(()=>burst(6+Math.floor(Math.random()*4)),i*250);
  setTimeout(()=>{ov.className='celeb';celebAct=false;},6000);
}

// ============================================================
//  财神
// ============================================================
function showCai(){
  const ov=document.getElementById('caishen');ov.innerHTML='';ov.className='caishen show';
  const e=document.createElement('div');e.className='caishen-e';e.textContent='🧧';ov.appendChild(e);
  const t=document.createElement('div');t.className='caishen-t';t.innerHTML='🎊 恭喜满勤！财神来贺 🎊';ov.appendChild(t);
  const gs=['🧧','🪙','💰','✨','💎'];
  for(let i=0;i<50;i++){const g=document.createElement('div');g.className='caishen-g';g.textContent=gs[Math.floor(Math.random()*gs.length)];g.style.left=Math.random()*100+'%';g.style.fontSize=(12+Math.random()*18)+'px';g.style.animationDuration=(3+Math.random()*4)+'s';g.style.animationDelay=(Math.random()*3)+'s';ov.appendChild(g);setTimeout(()=>g.remove(),8000);}
  playCai();for(let i=0;i<8;i++)setTimeout(()=>burst(10+Math.floor(Math.random()*6)),i*400);
  setTimeout(()=>{ov.className='caishen';},10000);
}

// ============================================================
//  数据统计面板
// ============================================================
function openStats(){
  const r=calc();const p=document.getElementById('statsPanel');
  document.getElementById('statsGrid').innerHTML=`
    <div class="stats-item"><div class="lbl">今日已赚</div><div class="val">¥${r.earn.toFixed(2)}</div><div class="sub">日薪 ¥${r.daily.toFixed(2)}</div></div>
    <div class="stats-item"><div class="lbl">本周已赚</div><div class="val">¥${r.wkE.toFixed(2)}</div><div class="sub">周目标 ¥${(r.daily*5).toFixed(2)}</div></div>
    <div class="stats-item"><div class="lbl">本月已赚</div><div class="val">¥${document.getElementById('statMonth').textContent}</div><div class="sub">月薪 ¥${settings.salary.toLocaleString()}</div></div>
    <div class="stats-item"><div class="lbl">每秒赚</div><div class="val">¥${(r.pms*1000).toFixed(4)}</div><div class="sub">每分钟 ¥${(r.pms*60000).toFixed(4)}</div></div>
    <div class="stats-item"><div class="lbl">今日工时</div><div class="val">${fmt(r.wrk).slice(0,5)}</div><div class="sub">${r.st==='working'?'搬砖中':r.st==='lunch'?'午休中':r.st==='after'?'已下班':'未开工'}</div></div>
    <div class="stats-item"><div class="lbl">满勤天数</div><div class="val">${r.att}/${settings.mwd}</div><div class="sub">${r.att>=settings.mwd?'✅ 已满勤！':'还差'+(settings.mwd-r.att)+'天'}</div></div>
    <div class="stats-full"><div class="lbl">日薪进度 ${Math.min(100,(r.earn/r.daily*100)).toFixed(0)}%</div><div class="bar"><div class="bar-fill" style="width:${Math.min(100,(r.earn/r.daily*100))}%"></div></div></div>
  `;
  p.classList.add('show');
}
function closeStats(){document.getElementById('statsPanel').classList.remove('show')}

// ============================================================
//  设置面板
// ============================================================
function openSettings(){
  document.getElementById('sSalary').value=settings.salary;
  document.getElementById('sSH').value=settings.sH;document.getElementById('sSM').value=settings.sM;
  document.getElementById('sEH').value=settings.eH;document.getElementById('sEM').value=settings.eM;
  document.getElementById('sLH').value=settings.lH;document.getElementById('sWD').value=settings.mwd;
  const db=document.getElementById('dayCb');db.innerHTML='';
  DAY.forEach((n,i)=>{
    const l=document.createElement('label');l.className='dc-lb'+(settings.wd.includes(i)?' on':'');
    const ip=document.createElement('input');ip.type='checkbox';ip.checked=settings.wd.includes(i);ip.dataset.day=i;
    ip.addEventListener('change',()=>l.classList.toggle('on'));
    l.appendChild(ip);l.appendChild(document.createTextNode('周'+n));db.appendChild(l);
  });
  // 语音包
  const sp=document.getElementById('spkOpts');sp.innerHTML='';
  SPK.forEach((p,i)=>{
    const l=document.createElement('label');l.className='spk-lb'+(spk===i?' on':'');
    const ip=document.createElement('input');ip.type='radio';ip.name='spk';ip.checked=spk===i;
    ip.addEventListener('change',()=>{
      document.querySelectorAll('.spk-lb').forEach(el=>el.classList.remove('on'));
      l.classList.add('on');
      document.getElementById('spkPreview').textContent=`当前: ${p.n} — ${p.d}`;
    });
    l.appendChild(ip);l.appendChild(document.createTextNode(p.i+' '+p.n));sp.appendChild(l);
  });
  document.getElementById('spkPreview').textContent=`当前: ${SPK[spk].n} — ${SPK[spk].d}`;
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('show')}
function saveSettings(){
  const ns={
    salary:parseFloat(document.getElementById('sSalary').value)||10000,
    sH:parseInt(document.getElementById('sSH').value)||9,sM:parseInt(document.getElementById('sSM').value)||0,
    eH:parseInt(document.getElementById('sEH').value)||18,eM:parseInt(document.getElementById('sEM').value)||0,
    lH:parseInt(document.getElementById('sLH').value)||1,wd:[],mwd:parseInt(document.getElementById('sWD').value)||22,
  };
  document.querySelectorAll('#dayCb input').forEach(ip=>{if(ip.checked)ns.wd.push(parseInt(ip.dataset.day))});
  if(ns.wd.length===0){alert('至少选一天');return;}
  // 语音包
  document.querySelectorAll('input[name="spk"]').forEach((ip,i)=>{if(ip.checked)spk=i});
  localStorage.setItem('salarySpk',spk);
  settings=ns;localStorage.setItem('salarySet',JSON.stringify(settings));lastInt=-1;closeSettings();
}
