<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 招财工资表</title>
<style>
:root {
  --gold-1: #f9d976;
  --gold-2: #f39c12;
  --gold-3: #e67e22;
  --gold-soft: rgba(249, 217, 118, 0.15);
  --bg-gradient: linear-gradient(135deg, #0d0705 0%, #1f1008 25%, #2d1810 50%, #1f1008 75%, #0d0705 100%);
  --text-primary: #fceabb;
  --text-secondary: #c9a96e;
  --text-muted: rgba(201, 169, 110, 0.45);
  --card-bg: rgba(255, 215, 150, 0.06);
  --card-border: rgba(255, 215, 150, 0.15);
  --card-hover: rgba(255, 215, 150, 0.12);
  --input-bg: rgba(255, 215, 150, 0.05);
  --input-focus: rgba(249, 217, 118, 0.08);
  --overlay-bg: rgba(0,0,0,0.7);
  --modal-bg: linear-gradient(160deg, #2d1810 0%, #1a0e0a 100%);
  --shadow: rgba(0,0,0,0.4);
  --work-color: #81c784;
  --rest-color: #ffb74d;
  --done-color: #69f0ae;
  --accent-blue: #5a9fcf;
}

/* ===== 深色模式 ===== */
body.dark-mode {
  --bg-gradient: linear-gradient(135deg, #050508 0%, #0d0d1a 30%, #050510 70%, #050508 100%);
  --text-primary: #c8c8d4;
  --text-secondary: #7a7a8a;
  --text-muted: rgba(120, 120, 140, 0.4);
  --card-bg: rgba(255, 255, 255, 0.02);
  --card-border: rgba(255, 255, 255, 0.06);
  --card-hover: rgba(255, 255, 255, 0.05);
  --input-bg: rgba(255, 255, 255, 0.03);
  --input-focus: rgba(255, 255, 255, 0.05);
  --overlay-bg: rgba(0,0,0,0.85);
  --modal-bg: linear-gradient(160deg, #0d0d1a 0%, #050508 100%);
  --shadow: rgba(0,0,0,0.6);
  --gold-1: #b8974a;
  --gold-2: #a07830;
  --gold-3: #8a6420;
  --work-color: #5a8a5c;
  --rest-color: #b89440;
  --done-color: #4a9a6e;
}
body.dark-mode .amount-number,
body.dark-mode .amount-decimal {
  background: linear-gradient(180deg, #d4d4e0 0%, #b8974a 45%, #8a6420 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: var(--bg-gradient);
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  user-select: none;
  transition: background 0.5s;
}

/* ===== 金元宝雨 ===== */
.ingot-rain {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.ingot {
  position: absolute;
  font-size: 28px;
  opacity: 0;
  animation: ingotFloat linear infinite;
  filter: drop-shadow(0 0 8px rgba(249, 217, 118, 0.2));
}
@keyframes ingotFloat {
  0%   { transform: translateY(105vh) rotate(0deg) scale(0.3); opacity: 0; }
  8%   { opacity: 0.5; transform: translateY(88vh) rotate(15deg) scale(0.7); }
  30%  { opacity: 0.6; transform: translateY(60vh) rotate(-10deg) scale(0.9); }
  60%  { opacity: 0.4; transform: translateY(30vh) rotate(20deg) scale(0.7); }
  85%  { opacity: 0.2; transform: translateY(8vh) rotate(-5deg) scale(0.4); }
  100% { transform: translateY(-5vh) rotate(10deg) scale(0.15); opacity: 0; }
}

/* ===== 背景金币闪烁 ===== */
.coin-sparkle {
  position: fixed;
  width: 10px; height: 10px;
  pointer-events: none;
  z-index: 0;
  animation: sparkleFloat linear infinite;
  opacity: 0;
  border-radius: 50%;
}
@keyframes sparkleFloat {
  0%   { transform: translateY(0) scale(0.3); opacity: 0; }
  15%  { opacity: 0.5; transform: translateY(-20px) scale(1); }
  70%  { opacity: 0.25; transform: translateY(-100px) scale(0.6); }
  100% { transform: translateY(-160px) scale(0.1); opacity: 0; }
}

/* ===== 主容器 ===== */
.container { position: relative; z-index: 1; text-align: center; width: 520px; max-width: 92vw; }

/* ===== 招财猫 ===== */
.lucky-cat {
  font-size: 76px;
  margin-bottom: 2px;
  animation: catWave 2.4s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(249, 217, 118, 0.2));
  cursor: pointer;
  transition: transform 0.15s;
  display: inline-block;
  position: relative;
}
.lucky-cat:hover { transform: scale(1.08); }
.lucky-cat::after {
  content: '💰';
  position: absolute; top: -8px; right: -16px;
  font-size: 18px;
  animation: catCoin 2s ease-in-out infinite;
}
@keyframes catCoin { 0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.7; } 50% { transform: translateY(-10px) rotate(15deg); opacity: 1; } }
@keyframes catWave { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
.lucky-cat.tapped { animation: catTap 0.35s ease; }
@keyframes catTap { 0% { transform: scale(1) rotate(0deg); } 30% { transform: scale(1.25) rotate(-10deg); } 60% { transform: scale(0.95) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); } }

/* ===== 子标题 ===== */
.subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 14px;
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(249, 217, 118, 0.1);
  display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;
}
.subtitle .day-status {
  display: inline-block;
  padding: 2px 12px;
  border-radius: 20px;
  font-size: 12px;
}
.day-status.working { background: rgba(76, 175, 80, 0.12); color: var(--work-color); box-shadow: 0 0 12px rgba(76, 175, 80, 0.08); }
.day-status.rest { background: rgba(255, 152, 0, 0.1); color: var(--rest-color); box-shadow: 0 0 12px rgba(255, 152, 0, 0.06); }

/* ===== 倒计时 / 已上班时长 ===== */
.countdown-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 14px;
  cursor: pointer;
  position: relative;
}
.countdown-wrapper:hover .countdown-label { color: var(--gold-2); }
.countdown-label {
  color: var(--text-secondary);
  font-size: 13px;
  transition: color 0.2s;
}
.countdown {
  font-size: 30px;
  font-weight: 700;
  color: var(--gold-1);
  text-shadow: 0 0 24px rgba(249, 217, 118, 0.25);
  font-variant-numeric: tabular-nums;
  letter-spacing: 3px;
  min-width: 148px;
  transition: color 0.3s;
}
.countdown.paused { color: var(--rest-color); text-shadow: 0 0 20px rgba(255, 152, 0, 0.15); }
.countdown.done { color: var(--done-color); text-shadow: 0 0 30px rgba(105, 240, 174, 0.3); }
.countdown-hint {
  position: absolute;
  bottom: -16px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ===== 金额显示 ===== */
.amount-wrapper {
  position: relative;
  margin: 6px 0;
  padding: 28px 20px 22px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: inset 0 0 80px rgba(249, 217, 118, 0.02), 0 8px 40px var(--shadow);
  overflow: hidden;
  transition: background 0.4s;
}
.amount-wrapper::before {
  content: '';
  position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 50% 0%, var(--gold-soft) 0%, transparent 50%);
  pointer-events: none;
}
.money-sign {
  font-size: 30px;
  color: var(--gold-1);
  vertical-align: top;
  line-height: 1;
  opacity: 0.6;
  margin-right: 2px;
  transition: color 0.4s;
}
.amount-number {
  font-size: 68px;
  font-weight: 800;
  background: linear-gradient(180deg, #fff3d6 0%, #f8b500 45%, #e67e22 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
  transition: all 0.4s;
}
.amount-decimal {
  font-size: 26px;
  font-weight: 600;
  background: linear-gradient(180deg, #fff3d6 0%, #f8b500 45%, #e67e22 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  vertical-align: baseline;
  letter-spacing: 1px;
  transition: all 0.4s;
}
.amount-cents {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 6px;
  letter-spacing: 1px;
  min-height: 20px;
  opacity: 0.85;
  transition: color 0.4s;
}

/* ===== 今日统计 ===== */
.stats-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--card-bg);
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.3s;
}
.stat-value { color: var(--gold-1); font-weight: 600; transition: color 0.3s; }
.stat-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 4px;
}
.stat-badge.goal-met { background: rgba(76, 175, 80, 0.15); color: var(--work-color); }

/* ===== 金币爆发 ===== */
.coin-burst-container {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
.coin-particle {
  position: absolute; pointer-events: none;
  animation: coinBurst 1.2s ease-out forwards;
  filter: drop-shadow(0 0 6px rgba(249, 217, 118, 0.3));
}
@keyframes coinBurst {
  0% { transform: translate(0,0) scale(0.3) rotate(0deg); opacity: 1; }
  25% { opacity: 1; transform: translate(var(--tx),var(--ty)) scale(1.3) rotate(160deg); }
  55% { opacity: 0.8; transform: translate(calc(var(--tx)*1.6),calc(var(--ty)*1.3)) scale(0.9) rotate(320deg); }
  100% { opacity: 0; transform: translate(calc(var(--tx)*2.8),calc(var(--ty)*2)) scale(0.15) rotate(720deg); }
}

/* ===== 庆祝 ===== */
.celebration-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:20; display:none;
}
.celebration-overlay.show { display:block; }
.celebration-text {
  position:absolute; top:44%; left:50%; transform:translate(-50%,-50%);
  font-size:52px; font-weight:800;
  color: var(--gold-1);
  text-shadow:0 0 40px rgba(249,217,118,0.4),0 0 80px rgba(249,217,118,0.15);
  animation:celebPulse 0.6s ease-out forwards; white-space:nowrap;
}
@keyframes celebPulse {
  0% { transform:translate(-50%,-50%) scale(0); opacity:0; }
  40% { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
}
.celebration-sub {
  position:absolute; top:54%; left:50%; transform:translate(-50%,0);
  font-size:18px; color:var(--text-secondary);
  animation:celebFade 2s ease-out forwards; opacity:0;
}
@keyframes celebFade {
  0% { opacity:0; transform:translate(-50%,10px); }
  20% { opacity:1; transform:translate(-50%,0); }
  80% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-10px); }
}
.celebration-confetti {
  position:absolute; border-radius:2px;
  animation:confettiFall var(--dur) ease-out forwards;
}
@keyframes confettiFall {
  0% { transform:translateY(-5vh) rotate(0deg); opacity:1; }
  100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
}

/* ===== 财神彩蛋 ===== */
.caishen-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:30; display:none;
}
.caishen-overlay.show { display:block; }
.caishen-emoji {
  position:absolute; font-size:120px;
  top:40%; left:50%; transform:translate(-50%,-50%);
  animation:caishenEnter 1.5s ease-out forwards;
  filter:drop-shadow(0 0 40px rgba(249,217,118,0.4));
}
@keyframes caishenEnter {
  0% { transform:translate(-50%,-80%) scale(0); opacity:0; }
  40% { transform:translate(-50%,-48%) scale(1.2); opacity:1; }
  60% { transform:translate(-50%,-52%) scale(0.95); }
  80% { transform:translate(-50%,-47%) scale(1.05); }
  100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
}
.caishen-text {
  position:absolute; top:58%; left:50%; transform:translate(-50%,0);
  font-size:28px; font-weight:800;
  color: #ff4444;
  text-shadow:0 0 30px rgba(255,68,68,0.3);
  animation:caishenText 0.8s 0.5s ease-out forwards; opacity:0; white-space:nowrap;
}
@keyframes caishenText {
  0% { opacity:0; transform:translate(-50%,20px); }
  100% { opacity:1; transform:translate(-50%,0); }
}
.caishen-gold {
  position:absolute; font-size:18px;
  animation:caishenGoldRain linear forwards; opacity:0;
}
@keyframes caishenGoldRain {
  0% { transform:translateY(-10vh) rotate(0deg); opacity:0.8; }
  100% { transform:translateY(105vh) rotate(360deg); opacity:0; }
}

/* ===== 顶部工具栏 ===== */
.top-bar {
  position: fixed; top:16px; right:16px;
  display: flex; gap: 6px; z-index:5;
}
.top-btn {
  width:38px; height:38px;
  border:1px solid var(--card-border);
  border-radius:50%;
  background:var(--card-bg);
  color:var(--text-secondary);
  font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.25s;
  backdrop-filter:blur(8px);
}
.top-btn:hover {
  background:var(--card-hover);
  color:var(--gold-1);
  box-shadow:0 0 16px rgba(249,217,118,0.08);
}
.sound-btn.muted { opacity:0.4; }
.dark-btn.active { color: #7c7cf0; box-shadow:0 0 12px rgba(124,124,240,0.15); }

/* ===== 满勤进度条 ===== */
.attendance-bar-wrapper {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px; justify-content: center;
}
.attendance-label { font-size: 11px; color: var(--text-muted); }
.attendance-track {
  width: 120px; height: 4px;
  background: var(--card-border);
  border-radius: 4px; overflow: hidden;
}
.attendance-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--gold-2), var(--gold-1));
  transition: width 0.5s ease;
}
.attendance-num { font-size: 11px; color: var(--text-secondary); }

/* ===== 设置弹窗 ===== */
.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:var(--overlay-bg);
  backdrop-filter:blur(8px);
  display:none; align-items:center; justify-content:center;
  z-index:50; animation:fadeIn 0.25s ease;
}
.modal-overlay.show { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--modal-bg);
  border:1px solid var(--card-border);
  border-radius:20px; padding:32px;
  width:440px; max-width:92vw; max-height:88vh; overflow-y:auto;
  animation:slideUp 0.3s ease;
  box-shadow:0 20px 60px var(--shadow);
  transition:background 0.4s;
}
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;
}
.modal-header h2 { font-size:20px; color:var(--gold-1); display:flex; align-items:center; gap:8px; transition:color 0.3s; }
.modal-close {
  width:32px; height:32px; border:1px solid var(--card-border); border-radius:50%;
  background:transparent; color:var(--text-secondary); cursor:pointer;
  font-size:16px; display:flex; align-items:center; justify-content:center; transition:0.2s;
}
.modal-close:hover { background:var(--card-hover); color:var(--gold-1); }
.form-group { margin-bottom:18px; }
.form-group label { display:block; color:var(--text-secondary); font-size:13px; margin-bottom:5px; letter-spacing:0.3px; transition:color 0.3s; }
.form-group .hint { font-size:11px; color:var(--text-muted); margin-top:3px; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }
input, select {
  width:100%; padding:10px 14px;
  background:var(--input-bg);
  border:1px solid var(--card-border);
  border-radius:10px; color:var(--text-primary);
  font-size:14px; outline:none; transition:0.2s; font-family:inherit;
}
input:focus, select:focus { border-color:var(--gold-2); box-shadow:0 0 20px var(--input-focus); }
input[type="number"] { -moz-appearance:textfield; }
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }
select option { background:#2d1810; color:var(--text-primary); }
.time-inputs { display:flex; align-items:center; gap:8px; }
.time-inputs input { width:80px; text-align:center; }
.time-inputs span.colon { color:var(--text-secondary); font-size:16px; font-weight:600; }
.day-checkboxes { display:flex; gap:6px; flex-wrap:wrap; }
.day-check {
  display:flex; align-items:center; gap:3px;
  padding:6px 11px; border:1px solid var(--card-border); border-radius:8px;
  cursor:pointer; transition:0.2s; color:var(--text-secondary);
  font-size:13px; background:transparent; user-select:none;
}
.day-check:hover { border-color:var(--gold-2); }
.day-check.active { background:var(--gold-soft); border-color:var(--gold-2); color:var(--gold-1); }
.day-check input { display:none; }
.modal-footer { margin-top:24px; display:flex; gap:10px; justify-content:flex-end; }
.btn {
  padding:10px 24px; border:none; border-radius:10px;
  font-size:14px; cursor:pointer; transition:0.2s;
  font-family:inherit; font-weight:600;
}
.btn-primary { background:linear-gradient(135deg,var(--gold-2),var(--gold-3)); color:#fff; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(243,156,18,0.2); }
.btn-secondary { background:var(--card-bg); color:var(--text-secondary); border:1px solid var(--card-border); }
.btn-secondary:hover { background:var(--card-hover); }

@media (max-width:530px) {
  .lucky-cat { font-size:52px; }
  .amount-number { font-size:42px; }
  .amount-decimal { font-size:18px; }
  .money-sign { font-size:22px; }
  .countdown { font-size:22px; min-width:110px; }
  .form-row { flex-direction:column; gap:0; }
  .modal { padding:20px; }
  .stats-row { gap:8px; font-size:11px; }
  .day-check { padding:4px 8px; font-size:12px; }
  .top-bar { top:10px; right:10px; }
  .top-btn { width:34px; height:34px; font-size:14px; }
  .celebration-text { font-size:36px; }
  .caishen-emoji { font-size:80px; }
}
</style>
</head>
<body>

<div class="ingot-rain" id="ingotRain"></div>
<div id="sparkleContainer"></div>
<div class="coin-burst-container" id="coinBurst"></div>
<div class="celebration-overlay" id="celebration"></div>
<div class="caishen-overlay" id="caishen"></div>

<div class="top-bar">
  <button class="top-btn dark-btn" id="darkBtn" onclick="toggleDarkMode()" title="深色模式">🌙</button>
  <button class="top-btn sound-btn" id="soundBtn" onclick="toggleSound()" title="音效开关">🔊</button>
  <button class="top-btn" onclick="openSettings()">⚙️</button>
</div>

<div class="container">
  <div class="lucky-cat" id="luckyCat" onclick="tapCat()">🐱</div>

  <div class="subtitle">
    今日搬砖收益
    <span class="day-status" id="dayStatus">● 工作日</span>
  </div>

  <!-- 倒计时 / 已上班 双模式 -->
  <div class="countdown-wrapper" onclick="toggleCountdownMode()" title="点击切换显示模式">
    <span class="countdown-label" id="countdownLabel">⏳ 距离下班</span>
    <span class="countdown" id="countdown">00:00:00</span>
  </div>

  <div class="amount-wrapper">
    <div>
      <span class="money-sign">¥</span>
      <span class="amount-number" id="amountInt">0</span>
      <span class="amount-decimal" id="amountDec">.00000000</span>
    </div>
    <div class="amount-cents" id="amountCents">开始搬砖赚小钱钱~</div>
  </div>

  <!-- 目标进度 -->
  <div class="stats-row">
    <div class="stat-item">💰 日薪 <span class="stat-value" id="dailySalary">--</span> <span class="stat-badge" id="dailyBadge"></span></div>
    <div class="stat-item">⚡ 每秒 <span class="stat-value" id="perSecond">--</span></div>
    <div class="stat-item">📅 本月 <span class="stat-value" id="monthEarned">--</span> <span class="stat-badge" id="monthBadge"></span></div>
  </div>

  <!-- 满勤进度 -->
  <div class="attendance-bar-wrapper" id="attendanceBar">
    <span class="attendance-label">📋 满勤</span>

<script>
// ============================================================
//  音效引擎
// ============================================================
let audioCtx = null, soundEnabled = true, darkMode = false, countdownMode = 0; // 0=剩余, 1=已上班

try { soundEnabled = localStorage.getItem('salarySound') !== 'false'; } catch(e) {}
try { darkMode = localStorage.getItem('salaryDark') === 'true'; } catch(e) {}
try { countdownMode = parseInt(localStorage.getItem('salaryCountdownMode')) || 0; } catch(e) {}

function getCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

document.addEventListener('click', () => { if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }, {once:true});

// 音效开关
function toggleSound() { soundEnabled=!soundEnabled; localStorage.setItem('salarySound',soundEnabled); updateSoundBtn(); if(soundEnabled) playCoinSound(); }
function updateSoundBtn() {
  const b=document.getElementById('soundBtn'); b.textContent=soundEnabled?'🔊':'🔇'; b.className='top-btn sound-btn'+(soundEnabled?'':' muted');
}

// ===== 1-UP 增命蘑菇音效 =====
function playCoinSound() {
  if(!soundEnabled) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    const notes=[
      {f:523.25,t:0,d:0.08},{f:659.25,t:0.07,d:0.08},{f:783.99,t:0.14,d:0.08},
      {f:1046.5,t:0.24,d:0.08},{f:1318.5,t:0.31,d:0.08},{f:1568,t:0.38,d:0.08},
      {f:2093,t:0.48,d:0.30}
    ];
    notes.forEach(({f,t,d})=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square'; o.frequency.setValueAtTime(f,now+t);
      g.gain.setValueAtTime(0.07,now+t); g.gain.setValueAtTime(0.07,now+t+d*0.7);
      g.gain.exponentialRampToValueAtTime(0.001,now+t+d);
      o.connect(g); g.connect(ctx.destination); o.start(now+t); o.stop(now+t+d);
    });
    [130.81,164.81,196].forEach(f=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f,now);
      g.gain.setValueAtTime(0.04,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.55);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.55);
    });
  } catch(e){}
}

// ===== 小礼花音效（攒够日薪/目标） =====
function playFireworkSound() {
  if(!soundEnabled) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    // 上行琶音 + 结尾爆裂音
    [
      {f:659.25,t:0,d:0.12},{f:783.99,t:0.1,d:0.12},{f:1046.5,t:0.2,d:0.12},
      {f:1318.5,t:0.32,d:0.15},{f:1568,t:0.42,d:0.2}
    ].forEach(({f,t,d})=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f,now+t);
      g.gain.setValueAtTime(0.1,now+t); g.gain.exponentialRampToValueAtTime(0.001,now+t+d);
      o.connect(g); g.connect(ctx.destination); o.start(now+t); o.stop(now+t+d);
    });
    // 爆裂噪声
    for(let i=0;i<4;i++){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(200+Math.random()*800,now+0.5+i*0.04);
      g.gain.setValueAtTime(0.04,now+0.5+i*0.04); g.gain.exponentialRampToValueAtTime(0.001,now+0.6+i*0.04);
      o.connect(g); g.connect(ctx.destination); o.start(now+0.5+i*0.04); o.stop(now+0.6+i*0.04);
    }
  } catch(e){}
}

// ===== 马里奥过关音效 =====
function playCelebrationSound() {
  if(!soundEnabled) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    const arp=[261.63,329.63,392,523.25,659.25,783.99,1046.5];
    arp.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square'; o.frequency.setValueAtTime(f,now+i*0.09);
      g.gain.setValueAtTime(0.06,now+i*0.09); g.gain.exponentialRampToValueAtTime(0.001,now+i*0.09+0.15);
      o.connect(g); g.connect(ctx.destination); o.start(now+i*0.09); o.stop(now+i*0.09+0.15);
    });
    [783.99,698.46,659.25,587.33,523.25].forEach((f,i)=>{
      const t=0.65+i*0.07, d=i===4?0.25:0.08;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square'; o.frequency.setValueAtTime(f,now+t);
      g.gain.setValueAtTime(0.06,now+t); g.gain.exponentialRampToValueAtTime(0.001,now+t+d);
      o.connect(g); g.connect(ctx.destination); o.start(now+t); o.stop(now+t+d);
    });
    [130.81,164.81,196].forEach(f=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f,now);
      g.gain.setValueAtTime(0.04,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.55);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.55);
    });
  } catch(e){}
}

// ===== 财神音效 =====
function playCaishenSound() {
  if(!soundEnabled) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    const gold=[784,988,1175,1319,1568,1976,2637];
    gold.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(f,now+i*0.06);
      g.gain.setValueAtTime(0.08,now+i*0.06); g.gain.exponentialRampToValueAtTime(0.001,now+i*0.06+0.25);
      o.connect(g); g.connect(ctx.destination); o.start(now+i*0.06); o.stop(now+i*0.06+0.25);
    });
    // 锣声
    [0.5,0.8].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(220,now+t); o.frequency.exponentialRampToValueAtTime(80,now+t+0.5);
      g.gain.setValueAtTime(0.15,now+t); g.gain.exponentialRampToValueAtTime(0.001,now+t+0.6);
      o.connect(g); g.connect(ctx.destination); o.start(now+t); o.stop(now+t+0.6);
    });
  } catch(e){}
}

// ============================================================
//  设置
// ============================================================
const DAY_NAMES=['日','一','二','三','四','五','六'];
function defSet(){ return {salary:10000,startH:9,startM:0,endH:18,endM:0,lunchH:1,workDays:[1,2,3,4,5],mWorkDays:22}; }
function loadSet(){
  try{ const r=localStorage.getItem('salarySettings'); if(r) return {...defSet(),...JSON.parse(r)}; }catch(e){}
  return defSet();
}
function saveSet(s){ localStorage.setItem('salarySettings',JSON.stringify(s)); }
let settings=loadSet();

// ============================================================
//  计算引擎
// ============================================================
let lastInt=-1, lastDaily=-1, celebrationActive=false, lastStatus='';
let attendanceDays=0, attendanceTriggered=false;

try{ attendanceDays=parseInt(localStorage.getItem('salaryAttendance'))||0; }catch(e){}
try{ attendanceTriggered=localStorage.getItem('salaryAttendanceTriggered')==='true'; }catch(e){}

function calc() {
  const now=new Date(), day=now.getDay();
  const isWD=settings.workDays.includes(day);
  const msNow=now.getHours()*60+now.getMinutes();
  const sMin=settings.startH*60+settings.startM, eMin=settings.endH*60+settings.endM;
  const lMin=settings.lunchH*60;
  const effMin=eMin-sMin-lMin;

  const daily=effMin>0?settings.salary/settings.mWorkDays:0;
  const perMs=effMin>0?daily/effMin/60/1000:0;

  let st='before', earned=0, remain=0, worked=0;
  const dayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate(),settings.startH,settings.startM,0,0);
  const dayEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate(),settings.endH,settings.endM,0,0);

  if(!isWD) { st='rest'; }
  else {
    const ls=sMin+effMin/2, le=ls+lMin;
    if(msNow<sMin){ st='before'; }
    else if(msNow<ls){
      st='working';
      const el=now-dayStart; earned=el*perMs; remain=dayEnd-now; worked=el;
    }
    else if(msNow<le){
      st='lunch';
      const morning=(ls-sMin)*60*1000; earned=morning*perMs; remain=dayEnd-now; worked=morning;
    }
    else if(msNow<eMin){
      st='working';
      const morning=(ls-sMin)*60*1000;
      const aEl=now-new Date(now.getFullYear(),now.getMonth(),now.getDate(),Math.floor(le/60),le%60,0,0);
      earned=(morning+Math.max(0,aEl))*perMs; remain=dayEnd-now; worked=morning+Math.max(0,aEl);
    }
    else { st='after'; earned=daily; remain=0; worked=(eMin-sMin-lMin)*60*1000; }
  }
  if(earned>daily) earned=daily; if(remain<0) remain=0; if(earned<0) earned=0;

  // 周薪
  const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  let weekEarned=0;
  for(let d=new Date(weekStart); d<=now; d.setDate(d.getDate()+1)){
    if(settings.workDays.includes(d.getDay())) weekEarned+=daily;
  }

  // 满勤 - 当月已出席工作日
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  let attThisMonth=0;
  for(let d=new Date(monthStart); d<now; d.setDate(d.getDate()+1)){
    if(settings.workDays.includes(d.getDay())) attThisMonth++;
  }

  return {earned,daily,perMs,remain,st,isWD,worked,weekEarned,attThisMonth};
}

// ============================================================
//  UI 更新
// ============================================================
function fmt(ms){ if(ms<=0) return '00:00:00'; const ts=Math.floor(ms/1000); return `${String(Math.floor(ts/3600)).padStart(2,'0')}:${String(Math.floor((ts%3600)/60)).padStart(2,'0')}:${String(ts%60).padStart(2,'0')}`; }

const tips=['继续加油赚小钱钱~','一分耕耘一分收获 🌾','今天的你超棒！✨','离富婆又近了一步 💅','摸鱼也能赚钱真爽 😎','每分每秒都在增值 📈','打工魂在燃烧 🔥','存钱罐越来越重了 🪙','赚钱的感觉真好 ✨','你是最靓的仔 🌟','财富自由第一步 💎','今天的努力是明天的快乐 ☀️'];
const restTips=['🎉 休息日就要好好玩！','☕ 享受美好时光~','🌴 休息是为了更好地赚钱','🎊 周末愉快！'];

function updateUI(){
  const r=calc();
  const {earned,daily,perMs,remain,st,isWD,worked,weekEarned,attThisMonth}=r;

  // 金额 - 千分位
  const intP=Math.floor(earned), decP=(earned-intP).toFixed(8).slice(2);
  document.getElementById('amountInt').textContent=intP.toLocaleString();
  document.getElementById('amountDec').textContent='.'+decP;

  // 鸡汤
  const ce=document.getElementById('amountCents');
  if(st==='before') ce.textContent='⏰ 还没上班，准备好搬砖了吗？';
  else if(st==='rest') ce.textContent=restTips[intP%restTips.length];
  else if(st==='lunch') ce.textContent='🍱 午休时间，好好吃饭~';
  else if(st==='after') ce.textContent='🎊 下班啦！今天赚了 ¥'+daily.toFixed(2)+'！';
  else ce.textContent=tips[intP%tips.length];

  // 倒计时 / 已上班 双模式
  const cd=document.getElementById('countdown'), cl=document.getElementById('countdownLabel');
  if(st==='rest'){ cd.textContent='🎉 休息日'; cd.className='countdown paused'; cl.textContent='⏳ 距离下班'; }
  else if(st==='before'){
    const diff=new Date(now()).setHours(settings.startH,settings.startM,0,0)-Date.now();
    cd.textContent=diff>0?'距上班 '+fmt(diff):'00:00:00'; cd.className='countdown paused';
    cl.textContent='⏳ 距离上班';
  }
  else if(st==='after'&&remain<=0){
    cd.textContent='🎉 已下班！'; cd.className='countdown done';
    cl.textContent='⏳ 下班啦';
  }
  else {
    if(countdownMode===0){
      cd.textContent=fmt(remain); cd.className='countdown';
      cl.textContent='⏳ 距离下班';
    } else {
      cd.textContent=fmt(worked); cd.className='countdown';
      cl.textContent='🕐 已上班';
    }
  }

  // 状态
  const se=document.getElementById('dayStatus');
  if(!isWD){ se.textContent='● 休息日'; se.className='day-status rest'; }
  else if(st==='lunch'){ se.textContent='● 午休中'; se.className='day-status rest'; }
  else if(st==='before'){ se.textContent='● 未开工'; se.className='day-status rest'; }
  else if(st==='after'){ se.textContent='● 已下班 🎉'; se.className='day-status rest'; }
  else{ se.textContent='● 搬砖中'; se.className='day-status working'; }

  // 统计
  document.getElementById('dailySalary').textContent=daily>0?daily.toFixed(2):'--';
  document.getElementById('perSecond').textContent=perMs>0?(perMs*1000).toFixed(4):'--';
  if(daily>0){
    const today=new Date(), mS=new Date(today.getFullYear(),today.getMonth(),1);
    let wdp=0; for(let d=new Date(mS); d<today; d.setDate(d.getDate()+1)){ if(settings.workDays.includes(d.getDay())) wdp++; }
    document.getElementById('monthEarned').textContent=(wdp*daily).toFixed(2);
  } else { document.getElementById('monthEarned').textContent='--'; }

  // 目标标签
  const db=document.getElementById('dailyBadge'), mb=document.getElementById('monthBadge');
  if(st==='working'&&earned>=daily*0.8) { db.textContent='🎯 即将达标'; db.className='stat-badge goal-met'; }
  else if(st==='working'&&earned>=daily) { db.textContent='✅ 已达标！'; db.className='stat-badge goal-met'; }
  else { db.textContent=''; db.className='stat-badge'; }

  // 满勤进度
  const af=document.getElementById('attendanceFill'), an=document.getElementById('attendanceNum');
  const pct=Math.min(100,(attThisMonth/settings.mWorkDays)*100);
  af.style.width=pct+'%';
  an.textContent=attThisMonth+'/'+settings.mWorkDays;

  // ===== 分层音效触发 =====
  const curInt=Math.floor(earned);
  if(st==='working'){
    // 每赚1元 → 蘑菇音效
    if(curInt>lastInt){
      const cnt=Math.min(curInt-lastInt,8);
      burstCoins(3+cnt);
      playCoinSound();
      lastInt=curInt;
    }
    // 攒够日薪 → 小礼花（每天只触发一次）
    if(curInt>=Math.floor(daily) && lastDaily!==Math.floor(daily)){
      lastDaily=Math.floor(daily);
      burstCoins(12);
      playFireworkSound();
    }
  } else if(st==='after'&&lastInt<0){ lastInt=Math.floor(earned); }
  else if(st==='rest'||st==='before'){ lastInt=-1; lastDaily=-1; }

  // 周薪达标提示
  if(isWD && weekEarned>=settings.salary/22*5 && !weekEarned._triggered){
    weekEarned._triggered=true;
    setTimeout(()=>{
      burstCoins(15);
      playFireworkSound();
    },300);
  }

  // ===== 下班庆祝 =====
  if(st==='after'&&!celebrationActive&&lastStatus!=='after'){ celebrateOffWork(); }
  lastStatus=st;

  // ===== 满勤彩蛋 =====
  if(attThisMonth>=settings.mWorkDays && !attendanceTriggered && st==='after'){
    attendanceTriggered=true;
    localStorage.setItem('salaryAttendanceTriggered','true');
    setTimeout(()=>showCaishen(), 1000);
  }
  // 每天首次访问记录出勤
  if(isWD && (st==='working'||st==='after') && attThisMonth>0){
    const todayKey=now().toDateString();
    const lastKey=localStorage.getItem('salaryAttDate');
    if(lastKey!==todayKey && attThisMonth>0){
      localStorage.setItem('salaryAttDate',todayKey);
      const cur=parseInt(localStorage.getItem('salaryAttendance'))||0;
      if(cur<settings.mWorkDays){
        localStorage.setItem('salaryAttendance',Math.min(cur+1,settings.mWorkDays));
      }
    }
  }
}
function now(){ return new Date(); }

// ============================================================
//  切换倒计时模式
// ============================================================
function toggleCountdownMode(){
  countdownMode=countdownMode===0?1:0;
  localStorage.setItem('salaryCountdownMode',countdownMode);
}

// ============================================================
//  深色模式
// ============================================================
function toggleDarkMode(){
  darkMode=!darkMode;
  localStorage.setItem('salaryDark',darkMode);
  document.body.classList.toggle('dark-mode',darkMode);
  document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';
  document.getElementById('darkBtn').classList.toggle('active',darkMode);
}

// ============================================================
//  金币爆发
// ============================================================
function burstCoins(count){
  const c=document.getElementById('coinBurst');
  const emojis=['🪙','💰','✨','🌟','💫','🤑','💎','👛'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='coin-particle'; el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const cx=window.innerWidth/2, cy=window.innerHeight/2-30;
    el.style.left=(cx+(Math.random()-0.5)*140)+'px'; el.style.top=(cy+(Math.random()-0.5)*60)+'px';
    const tx=(Math.random()-0.5)*320, ty=-(Math.random()*220+60);
    el.style.setProperty('--tx',tx+'px'); el.style.setProperty('--ty',ty+'px');
    el.style.fontSize=(18+Math.random()*18)+'px'; el.style.animationDuration=(0.8+Math.random()*0.5)+'s';
    c.appendChild(el); setTimeout(()=>el.remove(),1500);
  }
}

// ============================================================
//  下班庆祝
// ============================================================
function celebrateOffWork(){
  celebrationActive=true;
  const ov=document.getElementById('celebration'); ov.innerHTML=''; ov.className='celebration-overlay show';
  const t=document.createElement('div'); t.className='celebration-text'; t.textContent='🎉 下班啦！🎉'; ov.appendChild(t);
  const s=document.createElement('div'); s.className='celebration-sub'; s.textContent='今天赚了 ¥'+calc().daily.toFixed(2); ov.appendChild(s);
  const colors=['#f9d976','#ff6b6b','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#f368e0','#ffd1dc','#69f0ae','#ffab40'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div'); c.className='celebration-confetti';
    c.style.left=Math.random()*100+'%'; c.style.top='-5px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(3+Math.random()*8)+'px'; c.style.height=(3+Math.random()*8)+'px';
    c.style.setProperty('--dur',(2+Math.random()*3)+'s'); c.style.animationDelay=(Math.random()*2.5)+'s';
    c.style.borderRadius=['50%','2px','0'][Math.floor(Math.random()*3)];
    ov.appendChild(c); setTimeout(()=>c.remove(),6000);
  }
  playCelebrationSound();
  for(let i=0;i<6;i++) setTimeout(()=>burstCoins(6+Math.floor(Math.random()*4)),i*250);
  setTimeout(()=>{ ov.className='celebration-overlay'; celebrationActive=false; },6000);
}

// ============================================================
//  财神彩蛋 🧧
// ============================================================
function showCaishen(){
  const ov=document.getElementById('caishen'); ov.innerHTML=''; ov.className='caishen-overlay show';
  const e=document.createElement('div'); e.className='caishen-emoji'; e.textContent='🧧🧧🧧'; ov.appendChild(e);
  const f=document.createElement('div'); e.className='caishen-emoji'; e.textContent='🧧'; 
  const t=document.createElement('div'); t.className='caishen-text'; t.innerHTML='🎊 恭喜满勤！财神来贺 🎊'; ov.appendChild(t);
  const golds=['🧧','🪙','💰','✨','💎'];
  for(let i=0;i=50;i++){
    const g=document.createElement('div'); g.className='caishen-gold';
    g.textContent=golds[Math.floor(Math.random()*golds.length)];
    g.style.left=Math.random()*100+'%'; g.style.fontSize=(14+Math.random()*20)+'px';
    g.style.animationDuration=(3+Math.random()*4)+'s'; g.style.animationDelay=(Math.random()*3)+'s';
    ov.appendChild(g); setTimeout(()=>g.remove(),8000);
  }
  playCaishenSound();
  for(let i=0;i<8;i++) setTimeout(()=>burstCoins(10+Math.floor(Math.random()*6)),i*400);
  setTimeout(()=>{ ov.className='caishen-overlay'; },10000);
}

// ============================================================
//  招财猫点击
// ============================================================
function tapCat(){
  const cat=document.getElementById('luckyCat');
  cat.className='lucky-cat tapped'; setTimeout(()=>{cat.className='lucky-cat';},350);
  burstCoins(8); playCoinSound();
}

// ============================================================
//  设置面板
// ============================================================
function openSettings(){
  document.getElementById('setSalary').value=settings.salary;
  document.getElementById('setStartH').value=settings.startH; document.getElementById('setStartM').value=settings.startM;
  document.getElementById('setEndH').value=settings.endH; document.getElementById('setEndM').value=settings.endM;
  document.getElementById('setLunchH').value=settings.lunchH; document.getElementById('setWorkDays').value=settings.mWorkDays;
  const db=document.getElementById('dayCheckboxes'); db.innerHTML='';
  DAY_NAMES.forEach((n,i)=>{
    const l=document.createElement('label'); l.className='day-check'+(settings.workDays.includes(i)?' active':'');
    const ip=document.createElement('input'); ip.type='checkbox'; ip.checked=settings.workDays.includes(i); ip.dataset.day=i;
    ip.addEventListener('change',()=>l.classList.toggle('active'));
    l.appendChild(ip); l.appendChild(document.createTextNode('周'+n)); db.appendChild(l);
  });
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('show'); }
function saveSettings(){
  const ns={
    salary:parseFloat(document.getElementById('setSalary').value)||10000,
    startH:parseInt(document.getElementById('setStartH').value)||9, startM:parseInt(document.getElementById('setStartM').value)||0,
    endH:parseInt(document.getElementById('setEndH').value)||18, endM:parseInt(document.getElementById('setEndM').value)||0,
    lunchH:parseInt(document.getElementById('setLunchH').value)||1, workDays:[], mWorkDays:parseInt(document.getElementById('setWorkDays').value)||22,
  };
  document.querySelectorAll('#dayCheckboxes input').forEach(ip=>{ if(ip.checked) ns.workDays.push(parseInt(ip.dataset.day)); });
  if(ns.workDays.length===0){ alert('至少选择一天作为工作日'); return; }
  settings=ns; saveSet(settings); lastInt=-1; closeSettings();
}

// ============================================================
//  背景装饰
// ============================================================
function createIngots(){
  const c=document.getElementById('ingotRain'), is=['🪙','💰','🥇','✨'];
  for(let i=0;i<18;i++){
    const e=document.createElement('div'); e.className='ingot'; e.textContent=is[Math.floor(Math.random()*is.length)];
    e.style.left=(Math.random()*95+2.5)+'%'; e.style.fontSize=(16+Math.random()*20)+'px';
    e.style.animationDuration=(14+Math.random()*16)+'s'; e.style.animationDelay=(Math.random()*20)+'s';
    c.appendChild(e);
  }
}
function createSparkles(){
  const c=document.getElementById('sparkleContainer'), cs=['#f9d976','#f8b500','#ffd700','#ffecb3','#ffab40','#fff8e1'];
  for(let i=0;i<25;i++){
    const e=document.createElement('div'); e.className='coin-sparkle';
    e.style.left=Math.random()*100+'%'; e.style.top=Math.random()*100+'%';
    const s=3+Math.random()*8; e.style.width=s+'px'; e.style.height=s+'px';
    e.style.background=cs[Math.floor(Math.random()*cs.length)];
    e.style.animationDuration=(3+Math.random()*5)+'s'; e.style.animationDelay=(Math.random()*8)+'s';
    if(Math.random()>0.4) e.style.boxShadow='0 0 6px '+cs[Math.floor(Math.random()*cs.length)];
    c.appendChild(e);
  }
}

// ============================================================
//  启动
// ============================================================
createIngots(); createSparkles();
if(darkMode){ document.body.classList.add('dark-mode'); document.getElementById('darkBtn').textContent='☀️'; document.getElementById('darkBtn').classList.add('active'); }
updateSoundBtn(); updateUI();
setInterval(updateUI,50);
setInterval(()=>{lastInt=-1;},60000);
</script>
